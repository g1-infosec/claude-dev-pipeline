name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontmatter:
    name: Validate agent/skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate frontmatter
        run: python scripts/validate-frontmatter.py
